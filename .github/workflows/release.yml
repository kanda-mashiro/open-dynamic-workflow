name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # rusty_v8 cross-compilation is a known minefield: build natively.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Build (release)
        run: cargo build --release --locked
      - name: Package
        run: |
          PKG="codex-flow-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$PKG"
          cp target/release/codex-flow README.md "$PKG/"
          cp -R skill "$PKG/skill"
          tar -czf "$PKG.tar.gz" "$PKG"
          shasum -a 256 "$PKG.tar.gz" > "$PKG.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            codex-flow-*.tar.gz
            codex-flow-*.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "codex-flow ${{ github.ref_name }}" \
            --generate-notes
